services:
  - type: web
    name: agenda-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: agenda-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        value: https://agenda-front-1i78.onrender.com,http://localhost:9000
      - key: AUTH_COOKIE_NAME
        value: agenda_auth
      - key: AUTH_COOKIE_MAX_AGE_MS
        value: 86400000
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: WHATSAPP_PROVIDER
        value: mock
      - key: WHATSAPP_APPOINTMENT_LEAD_MINUTES
        value: "30"
      - key: WHATSAPP_REMINDER_LEAD_MINUTES
        value: "30"
      - key: WHATSAPP_SCAN_INTERVAL_MS
        value: "60000"
      - key: RECAPTCHA_SECRET_KEY
        sync: false
